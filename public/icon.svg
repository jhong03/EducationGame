<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Number Meadow">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9C7"/>
      <stop offset="1" stop-color="#FFD6E8"/>
    </linearGradient>
  </defs>
  <!-- maskable-safe background fills the whole canvas -->
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <!-- soft hill -->
  <path d="M0 400 Q256 320 512 400 L512 512 L0 512 Z" fill="#56C36A"/>
