      fill="#FFC24B" stroke="#E9A63B" stroke-width="6" stroke-linejoin="round"/>
    <!-- face -->
    <circle cx="-26" cy="-6" r="11" fill="#4A3A6B"/>
    <circle cx="26" cy="-6" r="11" fill="#4A3A6B"/>
    <circle cx="-22" cy="-10" r="4" fill="#FFF8EF"/>
    <circle cx="30" cy="-10" r="4" fill="#FFF8EF"/>
    <path d="M-20 22 Q0 42 20 22" fill="none" stroke="#4A3A6B" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-46" cy="16" r="9" fill="#FF7A9A" opacity="0.6"/>
    <circle cx="46" cy="16" r="9" fill="#FF7A9A" opacity="0.6"/>
  </g>
</svg>
